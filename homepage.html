<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avon Beauty Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="reset.css" />
  <style>
    :root {
      --ink: #111111;
      --muted: #6e6268;
      --line: rgba(17, 17, 17, 0.1);
      --soft: #f1eeee;
      --pink-soft: #ffe7f0;
      --shadow: 0 22px 60px rgba(22, 10, 15, 0.08);
    }

    body {
      min-height: 100vh;
      background: #ffffff;
      color: var(--ink);
      font-family: var(--font-body);
    }

    a:focus-visible,
    button:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
    }

    .page {
      width: min(100%, 1220px);
      margin: 0 auto;
      padding: 16px 24px 24px;
    }

    .header {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 0 24px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 12px 34px rgba(22, 10, 15, 0.05);
    }

    .logo {
      color: var(--color-primary);
      font-family: var(--font-heading);
      font-size: 25px;
      font-weight: 900;
      line-height: 1;
      text-decoration: none;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav::-webkit-scrollbar { display: none; }

    .nav a {
      color: var(--ink);
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      padding: 10px 12px;
      text-decoration: none;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .nav a:hover,
    .nav a.active {
      background: var(--pink-soft);
      color: var(--color-primary);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .icon-btn:hover {
      background: var(--pink-soft);
      color: var(--color-primary);
    }

    .banner {
      min-height: 240px;
      margin: 30px auto 30px;
      border-radius: 22px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.98) 0%, rgba(255, 255, 255, 0.9) 34%, rgba(255, 255, 255, 0.42) 55%, rgba(255, 255, 255, 0.02) 78%),
        url("product image.png") right center / cover no-repeat;
      display: flex;
      align-items: center;
      padding: clamp(28px, 4vw, 52px);
      overflow: hidden;
      position: relative;
    }

    .banner::after {
      display: none;
    }

    .banner-content {
      width: min(100%, 520px);
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      color: var(--color-primary);
      font-size: 10px;
      font-weight: 900;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .banner h1 {
      color: var(--ink);
      font-family: var(--font-heading);
      font-size: clamp(34px, 4vw, 48px);
      font-weight: 700;
      line-height: 0.98;
      margin-bottom: 10px;
      letter-spacing: 0;
    }

    .banner h1 span {
      color: var(--color-primary);
    }

    .banner p {
      max-width: 360px;
      color: var(--muted);
      font-size: clamp(13px, 1.3vw, 15px);
      font-weight: 500;
      line-height: 1.5;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 34px;
    }

    .beauty-card {
      min-height: 350px;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      display: block;
      color: #ffffff;
      text-decoration: none;
      box-shadow: var(--shadow);
      background: #eee;
      isolation: isolate;
      transition: transform 0.24s ease, box-shadow 0.24s ease;
    }

    .beauty-card:hover {
      color: #ffffff;
      transform: translateY(-6px);
      box-shadow: 0 30px 80px rgba(22, 10, 15, 0.16);
    }

    .beauty-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
      transition: transform 0.28s ease;
    }

    .beauty-card:hover img {
      transform: scale(1.04);
    }

    .beauty-card::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0) 48%, rgba(0, 0, 0, 0.5) 100%);
    }

    .beauty-card h2 {
      position: absolute;
      left: 32px;
      right: 28px;
      bottom: 32px;
      z-index: 2;
      color: #ffffff;
      font-family: var(--font-heading);
      font-size: clamp(20px, 1.8vw, 26px);
      font-weight: 800;
      line-height: 1.1;
    }

    .beauty-card--skin img { object-position: center 22%; }
    .beauty-card--hair img { object-position: center 22%; }
    .beauty-card--makeup img { object-position: center 24%; }

    @media (max-width: 980px) {
      .nav {
        display: none;
      }

      .banner {
        min-height: 280px;
        margin-top: 32px;
      }

      .cards {
        grid-template-columns: 1fr;
        gap: 22px;
      }

      .beauty-card {
        min-height: 390px;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 14px 12px 36px;
      }

      .header {
        min-height: 64px;
        border-radius: 10px;
        padding: 0 14px;
      }

      .logo {
        font-size: 24px;
      }

      .icon-btn {
        width: 36px;
        height: 36px;
      }

      .banner {
        min-height: 300px;
        border-radius: 20px;
        margin: 20px auto 24px;
        padding: 28px 20px;
      }

      .banner h1 {
        font-size: clamp(36px, 11vw, 48px);
      }

      .beauty-card {
        min-height: 360px;
        border-radius: 20px;
      }

      .beauty-card h2 {
        left: 22px;
        right: 22px;
        bottom: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <a href="#" class="logo">AVON</a>
      <nav class="nav" aria-label="Primary">
        <a href="#">ANEW</a>
        <a href="#">Fragrance</a>
        <a href="#">Skincare</a>
        <a class="active" href="#">Make Up</a>
        <a href="#">Personal Care</a>
        <a href="#">Combos</a>
      </nav>
      <div class="header-actions">
        <button class="icon-btn" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
        <button class="icon-btn" aria-label="Account">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
        <button class="icon-btn" aria-label="Cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
        </button>
      </div>
    </header>

    <section class="banner" aria-labelledby="banner-title">
      <div class="banner-content">
        <div class="eyebrow">Avon Beauty Tech</div>
        <h1 id="banner-title">Scan. Try. <span>Glow.</span></h1>
        <p>Beauty tools for skin, hair and makeup, all in one place.</p>
      </div>
    </section>

    <section class="cards" aria-label="Beauty tools">
      <a href="skin-analysis.html" class="beauty-card beauty-card--skin" aria-label="Open skin analysis">
        <img src="Image.png" alt="Skin analysis preview" />
        <h2>Skin Analysis</h2>
      </a>

      <a href="hair-color.html" class="beauty-card beauty-card--hair" aria-label="Open hair analysis">
        <img src="hair.png" alt="Hair analysis preview" />
        <h2>Hair Analysis</h2>
      </a>

      <a href="makeup-vto.html" class="beauty-card beauty-card--makeup" aria-label="Open makeup try-on">
        <img src="Makeup.png" alt="Makeup try-on preview" />
        <h2>Makeup Try-on</h2>
      </a>
    </section>
  </main>
</body>
</html>
